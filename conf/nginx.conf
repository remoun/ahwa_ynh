location __PATH__/ {
    proxy_pass http://127.0.0.1:__PORT__/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # WebSocket / SSE: streamed persona turns are SSE, which needs no
    # buffering and keep-alive support. Long timeout so a multi-round
    # deliberation doesn't get cut off mid-stream.
    proxy_buffering off;
    proxy_cache off;
    proxy_set_header Connection "";
    proxy_read_timeout 600s;

    # SSO: pass the user identity header through to the app. The header
    # name must match AHWA_IDENTITY_HEADER in the systemd unit.
    proxy_set_header Auth-User $remote_user;

    client_max_body_size 1M;

    more_set_headers "Content-Security-Policy: default-src 'self' 'unsafe-inline' 'unsafe-eval'; img-src 'self' data:; connect-src 'self'";
}
