#:schema https://raw.githubusercontent.com/YunoHost/apps/main/schemas/manifest.v2.schema.json
# SPDX-License-Identifier: AGPL-3.0-or-later

packaging_format = 2

id = "ahwa"
name = "Ahwa"
description.en = "Private AI deliberation rooms — convene a council of personas to think through a dilemma"
description.fr = "Salles de délibération IA privées — réunir un conseil de personas pour réfléchir à un dilemme"

version = "0.0.1~ynh1"

maintainers = ["remoun"]

[upstream]
license = "AGPL-3.0-or-later"
website = "https://ahwa.app"
code = "https://github.com/remoun/ahwa"
admindoc = "https://github.com/remoun/ahwa/blob/main/docs/self-host.md"
userdoc = "https://github.com/remoun/ahwa/blob/main/README.md"

[integration]
yunohost = ">= 12.0"
helpers_version = "2.1"
architectures = ["amd64", "arm64"]
multi_instance = true

# Ahwa does not query LDAP directly. It consumes the user identity from
# reverse-proxy headers set by SSOwat (see invariant #5).
ldap = "not_relevant"
sso = true

disk = "300M"
ram.build = "1G"
ram.runtime = "256M"

[install]
    [install.domain]
    type = "domain"

    [install.path]
    type = "path"
    default = "/"

    [install.init_main_permission]
    type = "group"
    default = "all_users"

[resources]
    # No `sources` block: the install script clones the repo directly so
    # we can iterate without cutting a tagged release for every change.
    # Switch to a tarball-based source once we have stable tagged releases.

    [resources.system_user]

    [resources.install_dir]

    [resources.data_dir]

    [resources.ports]

    [resources.apt]
    packages = "git, curl, ca-certificates, unzip"

    [resources.permissions]
    main.url = "/"
