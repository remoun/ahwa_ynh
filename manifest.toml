#:schema https://raw.githubusercontent.com/YunoHost/apps/main/schemas/manifest.v2.schema.json
# SPDX-License-Identifier: AGPL-3.0-or-later

packaging_format = 2

id = "ahwa"
name = "Ahwa"
description.en = "Private AI deliberation rooms — convene a council of personas to think through a dilemma"
description.fr = "Salles de délibération IA privées — réunir un conseil de personas pour réfléchir à un dilemme"

version = "0.2.2~ynh1"

maintainers = ["remoun"]

[upstream]
license = "AGPL-3.0-or-later"
website = "https://ahwa.app"
code = "https://github.com/remoun/ahwa"
admindoc = "https://github.com/remoun/ahwa/blob/main/docs/self-host.md"
userdoc = "https://github.com/remoun/ahwa/blob/main/README.md"

[integration]
yunohost = ">= 12.0"
helpers_version = "2.1"
architectures = ["amd64", "arm64"]
multi_instance = true

# Ahwa does not query LDAP directly. It consumes the user identity from
# reverse-proxy headers set by SSOwat (see invariant #5).
ldap = "not_relevant"
sso = true

disk = "300M"
# build/ comes pre-built in the release tarball, so no `bun run build`
# at install time. install only does `bun install --production`, which
# is bounded by deps size — 256M comfortably fits.
ram.build = "256M"
ram.runtime = "256M"

[install]
    [install.domain]
    type = "domain"

    [install.path]
    type = "path"
    default = "/"

    [install.init_main_permission]
    type = "group"
    default = "all_users"

    [install.llm_provider]
    ask.en = "Which LLM provider should Ahwa use?"
    ask.fr = "Quel fournisseur LLM Ahwa doit-il utiliser ?"
    type = "select"
    choices = ["openrouter", "anthropic", "openai", "ollama"]
    default = "openrouter"
    help.en = "OpenRouter is easiest — one key gives access to many models, with a free tier. Pick Ollama only if you have a local install at the URL below."
    help.fr = "OpenRouter est le plus simple : une seule clé pour accéder à plusieurs modèles, avec une offre gratuite. Choisissez Ollama uniquement si vous avez une installation locale à l'URL ci-dessous."

    [install.llm_api_key]
    ask.en = "API key for the chosen provider"
    ask.fr = "Clé API du fournisseur choisi"
    type = "password"
    optional = true
    visible = "llm_provider != 'ollama'"
    help.en = "Required for Anthropic, OpenAI, or OpenRouter. Stored in $install_dir/.env, readable only by the ahwa system user. Editable later via the YunoHost app config panel."
    help.fr = "Obligatoire pour Anthropic, OpenAI ou OpenRouter. Stockée dans $install_dir/.env, lisible uniquement par l'utilisateur système ahwa. Modifiable ultérieurement via le panneau de configuration YunoHost."

    [install.ollama_url]
    ask.en = "Ollama base URL"
    ask.fr = "URL de base Ollama"
    type = "string"
    optional = true
    default = "http://localhost:11434/api"
    visible = "llm_provider == 'ollama'"

[resources]

    # Pinned to the prebuilt release asset (build/ + package.json +
    # bun.lock + .bun-version), produced by ahwa's release-assets.yml
    # workflow and attached to each GitHub release. install/upgrade
    # only need `bun install --production` after extracting — no
    # `bun run build`, which used to OOM/timeout on the 1GB-RAM LXC
    # in package_check.
    #
    # autoupdate.asset filters the YNH apps autoupdate bot to the
    # build asset (rather than GitHub's auto-source tarball, which
    # would re-introduce the build step).
    [resources.sources.main]
    url = "https://github.com/remoun/ahwa/releases/download/v0.2.2/ahwa-build-v0.2.2.tar.gz"
    sha256 = "51ccba0da9b45ba852cf3a04de86af4ed6aa441bf26b9e0535f571c9a42b9472"
    autoupdate.strategy = "latest_github_release"
    autoupdate.asset = "ahwa-build-.*\\.tar\\.gz$"

    [resources.system_user]

    [resources.install_dir]

    [resources.data_dir]

    [resources.ports]

    [resources.apt]
    packages = "curl, ca-certificates, unzip"

    [resources.permissions]
    main.url = "/"
